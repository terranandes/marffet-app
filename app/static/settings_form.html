                        <div class="p-6 space-y-5">
                            <!-- GM Mode -->
                            <div class="flex items-center justify-between">
                                <div><label class="font-bold text-cyber-gold">🎮 {{ t('s_gm') }}</label>
                                    <p class="text-xs text-gray-400">Unlock all Premium features</p>
                                </div>
                                <button @click="toggleGMMode"
                                    :class="appSettings.gmMode ? 'bg-cyber-gold' : 'bg-gray-600'"
                                    class="w-14 h-7 rounded-full relative transition-colors duration-200">
                                    <span :class="appSettings.gmMode ? 'translate-x-7' : 'translate-x-1'"
                                        class="absolute top-1 w-5 h-5 bg-white rounded-full shadow transition-transform duration-200"></span>
                                </button>
                            </div>
                            <hr class="border-white/10">
                            <!-- Region Selector -->
                            <div>
                                <label class="font-bold text-sm mb-2 block">🌍 {{ t('s_region') }}</label>
                                <div class="flex gap-2">
                                    <button @click="appSettings.region = 'TW'; saveSettings()"
                                        :class="appSettings.region === 'TW' ? 'bg-cyber-cyan text-black' : 'bg-gray-700 text-gray-300'"
                                        class="flex-1 py-2 rounded font-bold text-sm transition">🇹🇼 Taiwan</button>
                                    <button @click="appSettings.region = 'CN'; saveSettings()"
                                        :class="appSettings.region === 'CN' ? 'bg-cyber-cyan text-black' : 'bg-gray-700 text-gray-300'"
                                        class="flex-1 py-2 rounded font-bold text-sm transition opacity-50"
                                        :disabled="!isPremium">🇨🇳 China</button>
                                    <button @click="appSettings.region = 'US'; saveSettings()"
                                        :class="appSettings.region === 'US' ? 'bg-cyber-cyan text-black' : 'bg-gray-700 text-gray-300'"
                                        class="flex-1 py-2 rounded font-bold text-sm transition opacity-50"
                                        :disabled="!isPremium">🇺🇸 USA</button>
                                </div>
                                <p v-if="!isPremium" class="text-xs text-gray-500 mt-1">⭐ China & USA require Premium
                                </p>
                            </div>
                            <hr class="border-white/10">
                            <!-- Language -->
                            <div class="mb-4">
                                <label class="font-bold text-sm mb-2 block">🌐 {{ t('s_lang') }}</label>
                                <select v-model="appSettings.language" @change="saveSettings()"
                                    class="w-full bg-gray-700 border border-white/20 rounded px-3 py-2 text-sm">
                                    <option v-for="lang in availableLanguages" :key="lang.code" :value="lang.code">
                                        {{ lang.name }}
                                    </option>
                                </select>
                            </div>

                            <!-- Default Tab -->
                            <div>
                                <label class="font-bold text-sm mb-2 block">🏠 Default Tab</label>
                                <select v-model="appSettings.defaultTab" @change="saveSettings()"
                                    class="w-full bg-gray-700 border border-white/20 rounded px-3 py-2 text-sm">
                                    <option value="mars">Mars Strategy</option>
                                    <option value="race">Bar Chart Race</option>
                                    <option value="cb">Convertible Bond</option>
                                    <option value="portfolio">📊 Portfolio</option>
                                    <option value="trend">📈 Trend</option>
                                    <option value="myrace">🏎️ My Race</option>
                                    <option value="ladder">🏆 Ladder</option>
                                </select>
                            </div>

                            <!-- Nickname Update -->
                            <div>
                                <label class="font-bold text-sm mb-2 block">👤 Nickname (Public)</label>
                                <div class="flex gap-2">
                                    <input v-model="newNickname" type="text" placeholder="Enter public nickname"
                                        class="flex-1 bg-gray-700 border border-white/20 rounded px-3 py-2 text-sm text-white">
                                    <button @click="updateProfile"
                                        class="bg-cyber-cyan text-black px-3 py-2 rounded font-bold text-sm hover:opacity-90">{{
                                        t('s_save') }}</button>
                                </div>
                                <p class="text-xs text-gray-500 mt-1">Shown on Leaderboard.</p>
                            </div>

                            <!-- API Key -->
                            <div class="mb-4">
                                <label class="font-bold text-sm mb-2 block">🔑 {{ t('s_api') }}</label>
                                <input v-model="appSettings.apiKey" @change="saveSettings()" type="password"
                                    placeholder="Enter your Gemini API Key"
                                    class="w-full bg-gray-700 border border-white/20 rounded px-3 py-2 text-sm text-white placeholder-gray-500">
                                <p class="text-xs text-gray-500 mt-1">Required for AI Copilot. Stored locally.</p>
                            </div>

                            <div class="text-center text-xs text-gray-500 pt-2">Martian Investment v1.1.0 | {{ isPremium
                                ?
                                '⭐ Premium' : '🆓 Free Tier' }}</div>
                        </div>
