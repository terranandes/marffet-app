<!-- Settings Modal -->
<div v-if="showSettings"
    class="fixed inset-0 z-[3000] bg-black/80 backdrop-blur-sm flex items-center justify-center p-10"
    @click.self="showSettings = false">
    <div class="glass-panel p-6 rounded-xl w-full max-w-lg relative bg-gray-900 border border-cyber-cyan/30">
        <button @click="showSettings = false"
            class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl">✕</button>
        <h2 class="text-xl font-bold text-cyber-cyan mb-2 flex items-center gap-2">⚙️ Global Settings</h2>
